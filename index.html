<style>
  :root{
    --bg:#0c1424; --bg-2:#0f1a2e; --panel:#111d33;
    --stroke:rgba(210,222,245,.12); --stroke-soft:rgba(210,222,245,.07);
    --txt:#eef2fb; --muted:#9fabc6; --muted-2:#7f8bab;
    --gold:#c9a548; --gold-2:#e6c980; --accent:#2f5db0; --accent-2:#3f74c9; --r:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;background:var(--bg);color:var(--txt);
    min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(1100px 700px at 85% -10%, rgba(47,93,176,.14), transparent 60%),
      radial-gradient(900px 600px at 0% 108%, rgba(201,165,72,.08), transparent 55%);}
  a{color:inherit}
  ::selection{background:rgba(201,165,72,.3)}

  /* ---------- app shell ---------- */
  .appbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    gap:12px;padding:14px clamp(16px,4vw,40px);border-bottom:1px solid var(--stroke-soft);
    background:rgba(12,20,36,.75);backdrop-filter:blur(12px)}
  .brand{display:flex;align-items:center;gap:12px;font-family:"Cormorant Garamond",serif;font-weight:700;
    font-size:20px;letter-spacing:.5px}
  .brand .mark{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),#1c3f82);border:1px solid var(--stroke)}
  .brand .mark svg{width:18px;height:18px;color:var(--gold-2)}
  .brand .ar{font-family:"IBM Plex Sans Arabic";font-size:14px;font-weight:600;color:var(--muted)}
  .appbar .tag{font-size:12px;color:var(--muted-2);border:1px solid var(--stroke-soft);
    padding:5px 12px;border-radius:100px}

  .wrap{max-width:1240px;margin:0 auto;padding:clamp(20px,4vw,40px)}

  /* ---------- builder layout ---------- */
  .builder{display:grid;grid-template-columns:minmax(0,420px) 1fr;gap:28px;align-items:start}
  @media(max-width:920px){.builder{grid-template-columns:1fr}}

  .panel{background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--stroke);
    border-radius:16px;padding:clamp(18px,3vw,26px);position:relative;overflow:hidden}
  .panel::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),var(--gold-2),var(--gold),transparent)}
  .panel h2{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:600;margin-bottom:4px}
  .panel .sub{color:var(--muted);font-size:13px;margin-bottom:20px}

  .field{margin-bottom:16px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:7px;letter-spacing:.3px}
  .field input,.field textarea{width:100%;font-family:inherit;font-size:14px;color:var(--txt);
    background:rgba(255,255,255,.03);border:1px solid var(--stroke);border-radius:9px;padding:11px 13px;
    transition:.2s;resize:vertical}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,165,72,.12);background:rgba(255,255,255,.05)}
  .field textarea{min-height:92px;line-height:1.7}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:480px){.grid2{grid-template-columns:1fr}}

  .templates{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px;margin:6px 0 22px;
    max-height:262px;overflow-y:auto;padding:2px 4px 2px 0}
  .templates::-webkit-scrollbar{width:8px}
  .templates::-webkit-scrollbar-thumb{background:var(--stroke);border-radius:8px}
  .tpl{cursor:pointer;border:1px solid var(--stroke);border-radius:10px;padding:7px;background:rgba(255,255,255,.02);
    transition:.2s;text-align:center}
  .tpl:hover{border-color:rgba(201,165,72,.5)}
  .tpl.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,165,72,.14)}
  .tpl .swatch{height:44px;border-radius:7px;margin-bottom:7px;position:relative;overflow:hidden}
  .tpl.t-royal .swatch{background:linear-gradient(135deg,#0f2a5e,#264f96)}
  .tpl.t-royal .swatch::after{content:"";position:absolute;top:0;left:0;right:0;height:5px;
    background:linear-gradient(90deg,#c9a548,#e6c980)}

  .tpl.t-light .swatch::after{content:"";position:absolute;bottom:8px;right:8px;left:8px;height:6px;
    border-radius:4px;background:#1c3f82}

  .tpl.t-burgundy .swatch{background:linear-gradient(135deg,#4a0f1a,#6e1a2a 55%,#8e2a3c)}
  .tpl.t-indigo   .swatch{background:linear-gradient(135deg,#1a1a6e,#3f3fb0 55%,#5a54e0)}
  .tpl.t-neon     .swatch{background:linear-gradient(135deg,#3a0a5e,#c81aa0 50%,#1ad0e0)}
  .tpl.t-ruby     .swatch{background:linear-gradient(135deg,#6e0a2e,#c01050 55%,#e0356e)}
  .tpl.t-coral    .swatch{background:linear-gradient(135deg,#e0654a,#ff8a6a 60%,#ffb59a)}
  .tpl.t-mint     .swatch{background:linear-gradient(135deg,#2aa06a,#4fc088 60%,#8fe0b5)}
  .tpl.t-steel    .swatch{background:linear-gradient(135deg,#54688a,#7488aa 60%,#9aabc4)}
  .tpl.t-gold     .swatch{background:linear-gradient(135deg,#2a2213,#8a6a1f 55%,#e8c063)}
  .tpl.t-sapphire .swatch{background:linear-gradient(135deg,#0a1f5e,#1a45b0 55%,#2f6ae0)}
  .tpl.t-obsidian .swatch{background:linear-gradient(135deg,#1a1b1f,#3a3d44 60%,#5a5e68)}
  .tpl.t-pearl    .swatch{background:linear-gradient(135deg,#c08a6a,#d8a888 60%,#eecab0)}
  .tpl.t-jade     .swatch{background:linear-gradient(135deg,#0a6a4c,#1aa07a 60%,#4fc0a0)}
  .tpl.t-amber    .swatch{background:linear-gradient(135deg,#3a2606,#b0741a 55%,#ffb020)}
  .tpl.t-cocoa    .swatch{background:linear-gradient(135deg,#6a4228,#a06a44 60%,#c89a72)}
  .tpl.t-denim    .swatch{background:linear-gradient(135deg,#3a5590,#4a6aa8 60%,#8aa0cc)}
  .tpl.t-turquoise .swatch{background:linear-gradient(135deg,#053a3a,#0f9a9a 60%,#1ac0c0)}
  .tpl.t-magenta  .swatch{background:linear-gradient(135deg,#4a0a52,#c010a0 55%,#e035c0)}
  .tpl.t-lime     .swatch{background:linear-gradient(135deg,#2a3a06,#5a8a1a 55%,#a6e022)}

  .tpl.t-charcoal .swatch{background:linear-gradient(135deg,#3a3d44,#5a5e68 60%,#787c86)}
  .tpl.t-berry    .swatch{background:linear-gradient(135deg,#400a34,#9a1a5a 55%,#c0357a)}
  .tpl.t-sky      .swatch{background:linear-gradient(135deg,#2f9ad8,#5fb8e8 60%,#a2dcf5)}
  .tpl.t-moss     .swatch{background:linear-gradient(135deg,#2a3210,#5a6a24 55%,#8a9a3a)}
  .tpl.t-tangerine .swatch{background:linear-gradient(135deg,#4a2206,#c05a10 55%,#ff8420)}

  .tpl .nm{font-size:11.5px;color:var(--muted);font-weight:500}
  .tpl.active .nm{color:var(--gold-2)}

  .btn{border:1px solid transparent;cursor:pointer;font-family:inherit;font-weight:600;font-size:14.5px;
    padding:13px 22px;border-radius:10px;color:#fff;transition:.2s;text-decoration:none;
    display:inline-flex;align-items:center;justify-content:center;gap:9px}
  .btn.primary{width:100%;background:linear-gradient(120deg,var(--accent),var(--accent-2))}
  .btn.primary:hover{transform:translateY(-2px);box-shadow:0 14px 34px -14px var(--accent)}
  .btn.gold{background:linear-gradient(120deg,var(--gold),#a8842f);color:#1a1300}
  .btn.gold:hover{transform:translateY(-2px)}
  .btn.ghost{background:transparent;border:1px solid var(--stroke);color:var(--muted)}
  .btn.ghost:hover{border-color:var(--gold);color:var(--txt)}
  .btn:disabled{opacity:.6;cursor:progress}
  .btn svg{width:18px;height:18px}

  .preview-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .preview-head .t{font-family:"Cormorant Garamond",serif;font-size:20px;font-weight:600}
  .preview-head .live{font-size:11px;color:#8ff5c0;display:flex;align-items:center;gap:6px}
  .preview-head .live::before{content:"";width:7px;height:7px;border-radius:50%;background:#8ff5c0;
    box-shadow:0 0 10px #8ff5c0}
  .stage{display:grid;place-items:center;padding:6px}

  /* ---------- result modal ---------- */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba:(6,10,18,.7);background:rgba(6,10,18,.72);
    backdrop-filter:blur(8px);display:none;place-items:center;padding:20px}
  .overlay.show{display:grid}
  .modal{width:min(520px,100%);background:linear-gradient(180deg,var(--panel),var(--bg-2));
    border:1px solid var(--stroke);border-radius:16px;padding:28px;position:relative;overflow:hidden}
  .modal::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),var(--gold-2),var(--gold),transparent)}
  .modal .ok{width:56px;height:56px;border-radius:50%;display:grid;place-items:center;margin:0 auto 14px;
    background:rgba(143,245,192,.12);border:1px solid rgba(143,245,192,.4);color:#8ff5c0}
  .modal h3{text-align:center;font-family:"Cormorant Garamond",serif;font-size:24px;margin-bottom:6px}
  .modal p{text-align:center;color:var(--muted);font-size:13.5px;margin-bottom:18px}
  .linkbox{display:flex;gap:8px;background:rgba(255,255,255,.03);border:1px solid var(--stroke);
    border-radius:10px;padding:8px 8px 8px 12px;align-items:center;margin-bottom:16px}
  .linkbox input{flex:1;background:transparent;border:none;color:var(--gold-2);font-size:13px;
    font-family:"Space Grotesk",monospace;outline:none;direction:ltr;text-align:left}
  .modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .modal .close{position:absolute;top:14px;left:14px;width:32px;height:32px;border-radius:8px;
    border:1px solid var(--stroke);background:transparent;color:var(--muted);cursor:pointer;font-size:16px}

  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:99;
    background:var(--panel);border:1px solid var(--stroke);color:var(--txt);padding:12px 22px;border-radius:10px;
    font-size:14px;opacity:0;pointer-events:none;transition:.35s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .loader{min-height:70vh;display:grid;place-items:center;text-align:center;color:var(--muted)}
  .spin{width:44px;height:44px;border-radius:50%;border:3px solid var(--stroke);border-top-color:var(--gold);
    animation:sp 1s linear infinite;margin:0 auto 16px}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* =====================================================================
     PROFILE CARD  —  shared by preview + viewer, themed via .t-* classes
     ===================================================================== */
  .pf{position:relative;width:min(760px,100%);border-radius:var(--r);overflow:hidden;
    border:1px solid var(--stroke);box-shadow:0 40px 110px -40px rgba(0,0,0,.8);
    --p-bg:#111d33;--p-bg2:#0f1a2e;--p-txt:#eef2fb;--p-muted:#9fabc6;--p-muted2:#7f8bab;
    --p-gold:#c9a548;--p-gold2:#e6c980;--p-accent:#2f5db0;--p-accent2:#3f74c9;--p-stroke:rgba(210,222,245,.12);
    --p-soft:rgba(210,222,245,.07);--p-cover:linear-gradient(135deg,#0f2a5e 0%,#1c3f82 50%,#264f96 100%);
    background:linear-gradient(180deg,var(--p-bg),var(--p-bg2));color:var(--p-txt);font-family:"IBM Plex Sans Arabic",sans-serif}
  .pf::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;z-index:5;
    background:linear-gradient(90deg,transparent,var(--p-gold),var(--p-gold2),var(--p-gold),transparent)}

  /* theme: light */
  .pf.t-light{--p-bg:#ffffff;--p-bg2:#f3f6fb;--p-txt:#16233d;--p-muted:#5a6a86;--p-muted2:#8593ad;
    --p-gold:#b3892f;--p-gold2:#8a6a1f;--p-accent:#1c3f82;--p-accent2:#2f5db0;
    --p-stroke:rgba(20,40,70,.12);--p-soft:rgba(20,40,70,.06);

    --p-stroke:rgba(200,180,255,.16);--p-soft:rgba(200,180,255,.08);

  /* theme: emerald */

    --p-gold:#9db3d6;--p-gold2:#c3d3ec;--p-accent:#3a4a63;--p-accent2:#54688a;
    --p-stroke:rgba(220,228,240,.12);--p-soft:rgba(220,228,240,.06);
    --p-cover:linear-gradient(135deg,#232c3b 0%,#3a4a63 60%,#54688a 100%)}
  /* theme: midnight */
  .pf.t-midnight{--p-bg:#05070d;--p-bg2:#02030a;--p-txt:#eaf1ff;--p-muted:#9aa6c2;--p-muted2:#727e9c;

    --p-stroke:rgba(66,34,46,.12);--p-soft:rgba(66,34,46,.05);border-color:rgba(66,34,46,.14);
    --p-cover:linear-gradient(135deg,#d87a98 0%,#eca0b8 60%,#f8ccd8 100%)}
  /* theme: seafoam (light) */
  .pf.t-seafoam{--p-bg:#f0fbf9;--p-bg2:#dcf2ee;--p-txt:#0f3a36;--p-muted:#4a7a74;--p-muted2:#7f9c98;
    --p-gold:#0f9a8a;--p-gold2:#0a6a60;--p-accent:#1ab0a0;--p-accent2:#4fc8ba;
    --p-stroke:rgba(15,50,48,.12);--p-soft:rgba(15,50,48,.05);border-color:rgba(15,50,48,.14);
    --p-cover:linear-gradient(135deg,#1ab0a0 0%,#4fc8ba 60%,#9ee0d6 100%)}

  /* ---------- 3D effect ---------- */
  .pf.is3d{transition:transform .15s ease-out;transform-style:preserve-3d}
  .pf-glare{position:absolute;inset:0;z-index:6;pointer-events:none;border-radius:inherit;opacity:0;
    background:radial-gradient(600px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.16),transparent 42%);
    transition:opacity .3s}
  .pf.is3d:hover .pf-glare{opacity:1}
  .pf.is3d .pf-top,.pf.is3d .pf-actions{transform:translateZ(34px)}
  .pf.is3d .pf-avatar{transform:translateZ(22px)}

  /* =========== LAYOUTS (structural variants) =========== */
  /* -- sidebar / CV -- */
  .pf.l-sidebar{display:flex;flex-wrap:wrap}
  .l-sidebar .pf-side{flex:0 0 40%;min-width:230px;background:var(--p-cover);color:#fff;
    padding:38px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:6px}
  .l-sidebar .pf-side .pf-avatar{--s:118px;margin-bottom:8px;box-shadow:0 0 0 5px rgba(255,255,255,.16),0 18px 40px -16px rgba(0,0,0,.5)}
  .l-sidebar .pf-side .pf-name{color:#fff}
  .l-sidebar .pf-side .pf-name .en{color:rgba(255,255,255,.82)}
  .l-sidebar .pf-side .pf-role{color:rgba(255,255,255,.9);font-size:14px}
  .l-sidebar .pf-side .pf-kicker{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.14)}
  .l-sidebar .pf-side .pf-kicker::before{background:#fff}
  .l-sidebar .pf-side-contact{width:100%;margin-top:16px}
  .l-sidebar .pf-side .pf-actions{flex-direction:column}
  .l-sidebar .pf-side .pf-btn{width:100%;justify-content:center;background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.32);color:#fff}
  .l-sidebar .pf-side .pf-btn.au{background:rgba(255,255,255,.92);color:#1a1300;border:none}
  .l-sidebar .pf-main{flex:1;min-width:270px;padding:clamp(24px,3.5vw,38px)}
  .l-sidebar .pf-main .pf-info{grid-template-columns:1fr}

  /* -- hero overlay -- */
  .l-hero .pf-hero{position:relative;background:var(--p-cover);color:#fff;text-align:center;
    padding:clamp(30px,5vw,42px) 24px clamp(26px,4vw,34px);overflow:hidden}
  .l-hero .pf-hero::after{content:"";position:absolute;inset:0;
    background:radial-gradient(closest-side at 50% 0%,rgba(255,255,255,.22),transparent 70%);mix-blend-mode:screen}
  .l-hero .pf-hero-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
  .l-hero .pf-hero .pf-avatar{--s:108px;margin-bottom:12px;box-shadow:0 0 0 5px rgba(255,255,255,.18),0 18px 44px -16px rgba(0,0,0,.5)}
  .l-hero .pf-hero .pf-name{color:#fff}
  .l-hero .pf-hero .pf-name .en{color:rgba(255,255,255,.82)}
  .l-hero .pf-hero .pf-role{color:rgba(255,255,255,.9);margin-inline:auto}
  .l-hero .pf-hero .pf-kicker{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.14)}
  .l-hero .pf-hero .pf-kicker::before{background:#fff}
  .l-hero .pf-inner{padding-top:26px}

  /* -- minimal centered -- */
  .l-minimal .pf-inner{text-align:center;padding:clamp(32px,5vw,46px) clamp(22px,4vw,44px)}
  .l-minimal .pf-avatar{--s:120px;margin:0 auto 10px}
  .l-minimal .pf-role{margin-inline:auto}
  .l-minimal .pf-about{margin-inline:auto;text-align:center;max-width:60ch}
  .l-minimal .pf-sec{justify-content:center}
  .l-minimal .pf-info{max-width:560px;margin-inline:auto;text-align:right}
  .l-minimal .pf-actions{justify-content:center}

  /* -- bento grid -- */
  .l-bento .pf-bento{display:grid;grid-template-columns:1fr 1fr;gap:13px;padding:clamp(16px,3vw,24px)}
  .l-bento .bento-tile{border:1px solid var(--p-soft);border-radius:14px;padding:20px;
    background:color-mix(in srgb,var(--p-txt) 3%,transparent)}
  .l-bento .bento-tile.hero{grid-column:1/-1;display:flex;align-items:center;gap:20px;
    background:var(--p-cover);color:#fff;border:none}
  .l-bento .bento-tile.hero .pf-avatar{--s:92px;flex:none}
  .l-bento .bento-tile.hero .pf-name{color:#fff}
  .l-bento .bento-tile.hero .pf-name .en{color:rgba(255,255,255,.82)}
  .l-bento .bento-tile.hero .pf-role{color:rgba(255,255,255,.9)}
  .l-bento .bento-tile.hero .pf-kicker{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.16)}
  .l-bento .bento-tile.hero .pf-kicker::before{background:#fff}
  .l-bento .bento-tile.about{grid-column:1/-1}
  .l-bento .tile-h{font-family:"Cormorant Garamond",serif;font-size:17px;font-weight:600;color:var(--p-gold2);margin-bottom:11px}
  .l-bento .pf-info{grid-template-columns:1fr;gap:10px}
  .l-bento .pf-about{font-size:14px}
  @media(max-width:560px){.l-bento .pf-bento{grid-template-columns:1fr}.l-bento .bento-tile.hero{flex-direction:column;text-align:center}}

  /* -- fullphoto -- */
  .l-fullphoto .pf-fp{position:relative;min-height:clamp(280px,42vw,380px);background:var(--p-cover);
    display:flex;align-items:flex-end;overflow:hidden}
  .l-fullphoto .fp-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .l-fullphoto .fp-scrim{position:absolute;inset:0;z-index:1;background:linear-gradient(0deg,rgba(0,0,0,.82),rgba(0,0,0,.15) 55%,transparent)}
  .l-fullphoto .fp-inner{position:relative;z-index:2;padding:clamp(22px,4vw,34px);color:#fff;width:100%}
  .l-fullphoto .fp-inner .pf-name{color:#fff}
  .l-fullphoto .fp-inner .pf-name .en{color:rgba(255,255,255,.85)}
  .l-fullphoto .fp-inner .pf-role{color:rgba(255,255,255,.9)}
  .l-fullphoto .fp-inner .pf-kicker{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.16)}
  .l-fullphoto .fp-inner .pf-kicker::before{background:#fff}

  /* -- timeline -- */
  .pf-timeline{position:relative;padding-right:20px;margin-top:4px}
  .pf-timeline::before{content:"";position:absolute;top:6px;bottom:6px;right:5px;width:2px;
    background:linear-gradient(var(--p-gold),transparent)}
  .tl-item{position:relative;padding:0 22px 18px 0}
  .tl-item:last-child{padding-bottom:2px}
  .tl-dot{position:absolute;right:-1px;top:4px;width:12px;height:12px;border-radius:50%;
    background:var(--p-gold);box-shadow:0 0 0 4px color-mix(in srgb,var(--p-gold) 22%,transparent)}
  .tl-c .l{font-size:11.5px;color:var(--p-muted2);letter-spacing:.4px}
  .tl-c .v{font-size:15px;color:var(--p-txt);font-weight:600;margin-top:2px}

  /* -- magazine -- */
  .l-magazine .mag-head{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .l-magazine .pf-avatar{--s:104px}
  .l-magazine .pf-name{font-family:"Cormorant Garamond",serif;font-size:clamp(34px,6.5vw,62px);line-height:1.02}
  .l-magazine .mag-about{column-count:2;column-gap:30px;line-height:2;color:var(--p-muted);font-size:14.5px;
    text-align:justify}
  .l-magazine .mag-about::first-letter{font-family:"Cormorant Garamond",serif;font-size:3.4em;font-weight:700;
    color:var(--p-gold2);float:right;line-height:.8;margin:4px 0 0 10px}
  @media(max-width:600px){.l-magazine .mag-about{column-count:1}}

  /* -- badge -- */
  .l-badge{max-width:520px;margin-inline:auto}
  .l-badge .pf-badge{position:relative;padding:34px 26px 16px;text-align:center}
  .l-badge .badge-hole{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:46px;height:8px;
    border-radius:6px;background:var(--p-soft);border:1px solid var(--p-stroke)}
  .l-badge .pf-badge::before{content:"";position:absolute;top:0;right:0;bottom:0;width:7px;background:var(--p-cover)}
  .l-badge .pf-badge::after{content:"";position:absolute;top:0;left:0;bottom:0;width:7px;background:var(--p-cover)}
  .l-badge .badge-body{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:8px}
  .l-badge .pf-avatar{--s:110px}
  .l-badge .badge-info{width:100%;margin-top:6px}
  .l-badge .badge-info .pf-info{grid-template-columns:1fr}
  .l-badge .pf-actions{justify-content:center;margin-top:6px}
  .l-badge .badge-foot{margin-top:16px;padding-top:12px;border-top:1px dashed var(--p-stroke);
    font-family:"Space Grotesk",monospace;font-size:11px;letter-spacing:2px;color:var(--p-muted2)}

  /* -- terminal -- */
  .l-terminal .pf-term{margin:14px;border-radius:12px;overflow:hidden;border:1px solid var(--p-stroke);
    font-family:"Space Grotesk",ui-monospace,monospace;background:color-mix(in srgb,var(--p-bg) 60%,#000)}
  .l-terminal .term-bar{display:flex;align-items:center;gap:7px;padding:10px 14px;background:color-mix(in srgb,var(--p-txt) 6%,transparent);border-bottom:1px solid var(--p-stroke)}
  .l-terminal .term-bar span{width:11px;height:11px;border-radius:50%;background:var(--p-muted2);opacity:.6}
  .l-terminal .term-bar span:nth-child(1){background:#ff5f57;opacity:1}
  .l-terminal .term-bar span:nth-child(2){background:#febc2e;opacity:1}
  .l-terminal .term-bar span:nth-child(3){background:#28c840;opacity:1}
  .l-terminal .term-title{margin-right:8px;font-size:12px;color:var(--p-muted2)}
  .l-terminal .term-body{padding:18px 18px 22px;font-size:13.5px;line-height:1.7}
  .l-terminal .term-line{color:var(--p-muted);margin-top:12px}
  .l-terminal .term-line:first-child{margin-top:0}
  .l-terminal .tp{color:var(--p-gold);margin-left:8px;font-weight:700}
  .l-terminal .term-out{color:var(--p-txt);padding:4px 18px 0;white-space:pre-wrap}
  .l-terminal .term-out.mono .tk{color:var(--p-gold2)}
  .l-terminal .term-out .tsep{color:var(--p-muted2)}
  .l-terminal .term-cta{padding:8px 14px 0}
  .l-terminal .cursor-blink{animation:blink 1s step-end infinite}
  @keyframes blink{50%{opacity:0}}

  /* -- polaroid -- */
  .l-polaroid .pola-wrap{display:flex;gap:26px;align-items:center;flex-wrap:wrap;justify-content:center}
  .l-polaroid .polaroid{background:#fff;padding:12px 12px 34px;border-radius:3px;transform:rotate(-4deg);
    box-shadow:0 20px 44px -14px rgba(0,0,0,.5);flex:none}
  .l-polaroid .pola-photo{width:170px;height:170px;background:linear-gradient(135deg,var(--p-accent),#1c3f82);
    display:grid;place-items:center;overflow:hidden;font-family:"Amiri",serif;font-size:60px;color:#fff}
  .l-polaroid .pola-photo img{width:100%;height:100%;object-fit:cover}
  .l-polaroid .pola-cap{margin-top:12px;text-align:center;font-family:"Amiri",serif;font-size:19px;color:#222}
  .l-polaroid .pola-info{flex:1;min-width:220px}

  /* -- diagonal -- */
  .l-diagonal .pf-diag{position:relative;background:var(--p-cover);color:#fff;
    padding:clamp(30px,5vw,44px) clamp(22px,4vw,34px) clamp(46px,7vw,64px);
    clip-path:polygon(0 0,100% 0,100% 74%,0 100%)}
  .l-diagonal .diag-inner{position:relative;z-index:2;display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .l-diagonal .diag-inner .pf-avatar{--s:104px;margin-bottom:6px}
  .l-diagonal .diag-inner .pf-name{color:#fff}
  .l-diagonal .diag-inner .pf-name .en{color:rgba(255,255,255,.85)}
  .l-diagonal .diag-inner .pf-role{color:rgba(255,255,255,.9)}
  .l-diagonal .diag-inner .pf-kicker{color:#fff;border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.16)}
  .l-diagonal .diag-inner .pf-kicker::before{background:#fff}
  .l-diagonal .diag-inner .pf-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.32);color:#fff}
  .l-diagonal .diag-inner .pf-btn.au{background:rgba(255,255,255,.92);color:#1a1300;border:none}
  .l-diagonal .diag-body{margin-top:-20px}

  /* -- compact -- */
  .l-compact{max-width:600px;margin-inline:auto}
  .l-compact .pf-compact{display:flex;align-items:center;gap:20px;padding:22px 24px;
    border-right:4px solid var(--p-gold)}
  .l-compact .pf-avatar{--s:96px;flex:none}
  .l-compact .compact-main{flex:1;min-width:0}
  .l-compact .compact-meta{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0}
  .l-compact .compact-meta span{font-size:11.5px;color:var(--p-muted);background:var(--p-soft);
    border:1px solid var(--p-stroke);padding:4px 10px;border-radius:100px}
  .l-compact .pf-actions{margin-top:6px}
  @media(max-width:480px){.l-compact .pf-compact{flex-direction:column;text-align:center;border-right:none;border-top:4px solid var(--p-gold)}}

  /* -- framed / certificate -- */
  .l-framed .framed{padding:16px;text-align:center}
  .l-framed .frame-box{border:2px solid var(--p-gold);outline:1px solid var(--p-gold);outline-offset:5px;
    padding:clamp(26px,4vw,40px) clamp(20px,4vw,36px);border-radius:4px}
  .l-framed .frame-orn{font-size:22px;color:var(--p-gold2);margin:2px 0 14px}
  .l-framed .frame-orn:last-child{margin:16px 0 0}
  .l-framed .pf-avatar{--s:112px;margin:0 auto 10px}
  .l-framed .pf-name{font-family:"Amiri",serif}
  .l-framed .pf-kicker{margin-inline:auto}
  .l-framed .pf-role{margin-inline:auto}
  .l-framed .pf-about{margin-inline:auto;text-align:center;max-width:58ch}
  .l-framed .pf-sec{justify-content:center}
  .l-framed .pf-info{max-width:520px;margin-inline:auto;text-align:right}
  .l-framed .pf-actions{justify-content:center}

  /* -- spotlight -- */
  .l-spotlight .pf-spot{position:relative;text-align:center;overflow:hidden;
    padding:clamp(38px,6vw,56px) 24px clamp(28px,4vw,40px);
    background:radial-gradient(closest-side at 50% 32%,color-mix(in srgb,var(--p-accent) 55%,transparent),transparent 72%)}
  .l-spotlight .spot-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
  .l-spotlight .pf-spot .pf-avatar{--s:128px;margin-bottom:12px;
    box-shadow:0 0 0 6px color-mix(in srgb,var(--p-gold) 15%,transparent),0 0 60px -4px var(--p-gold)}
  .l-spotlight .pf-spot .pf-kicker{margin-inline:auto}
  .l-spotlight .pf-spot .pf-role{margin-inline:auto}
  .l-spotlight .pf-spot .pf-actions{justify-content:center}

  /* layout picker */
  .layouts{display:grid;grid-template-columns:repeat(auto-fill,minmax(112px,1fr));gap:8px;margin:6px 0 20px}
  .lay{cursor:pointer;border:1px solid var(--stroke);border-radius:10px;padding:9px 8px 8px;
    background:rgba(255,255,255,.02);transition:.2s;text-align:center}
  .lay:hover{border-color:rgba(201,165,72,.5)}
  .lay.active{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,165,72,.14)}
  .lay svg{width:100%;height:30px;color:var(--muted);display:block;margin-bottom:6px}
  .lay.active svg{color:var(--gold-2)}
  .lay .ln{font-size:12px;font-weight:600;color:var(--txt)}
  .lay .ld{font-size:10px;color:var(--muted-2);margin-top:1px}
  .lay-search{width:100%;font-family:inherit;font-size:13px;color:var(--txt);background:rgba(255,255,255,.03);
    border:1px solid var(--stroke);border-radius:9px;padding:9px 12px;margin-bottom:8px}
  .lay-search:focus{outline:none;border-color:var(--gold)}

  /* ---------- layout modifiers (variants) ---------- */
  .av-rounded .pf-avatar,.av-rounded .pf-avatar img{border-radius:22px}
  .av-square .pf-avatar,.av-square .pf-avatar img{border-radius:8px}
  .av-hex .pf-avatar,.av-hex .pf-avatar img{border-radius:0;clip-path:polygon(50% 0,100% 25%,100% 75%,50% 100%,0 75%,0 25%)}
  .av-rounded .pf-avatar::after,.av-square .pf-avatar::after,.av-hex .pf-avatar::after{display:none}
  .fn-sans .pf-name{font-family:"IBM Plex Sans Arabic",sans-serif;font-weight:700}
  .fn-mono .pf-name{font-family:"Space Grotesk",ui-monospace,monospace;font-weight:700;letter-spacing:.5px}
  .ac-ring .pf-avatar::before{content:"";position:absolute;inset:-8px;border-radius:inherit;
    border:1.5px dashed var(--p-gold);pointer-events:none}
  .av-hex.ac-ring .pf-avatar::before{display:none}
  .ac-underline .pf-name{display:inline-block;border-bottom:3px solid var(--p-gold);padding-bottom:6px}
  .ac-bar .pf-who{border-right:3px solid var(--p-gold);padding-right:14px}
  .l-minimal.ac-bar .pf-who,.l-framed.ac-bar .pf-who,.l-hero.ac-bar .pf-who,.l-spotlight.ac-bar .pf-who{border-right:none;padding-right:0}

  /* ---------- toggle switch ---------- */
  .opt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:2px 0 20px;
    padding:12px 15px;border:1px solid var(--stroke);border-radius:10px;background:rgba(255,255,255,.02)}
  .opt-row .lbl{font-size:13.5px;color:var(--txt)}
  .opt-row .desc{font-size:11.5px;color:var(--muted-2);margin-top:3px}
  .switch{position:relative;width:46px;height:26px;flex:none}
  .switch input{opacity:0;width:0;height:0;position:absolute}
  .switch .slider{position:absolute;inset:0;border-radius:100px;background:rgba(255,255,255,.12);
    border:1px solid var(--stroke);cursor:pointer;transition:.2s}
  .switch .slider::before{content:"";position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;
    background:#fff;transition:.2s}
  .switch input:checked + .slider{background:linear-gradient(120deg,var(--accent),var(--accent-2));border-color:transparent}
  .switch input:checked + .slider::before{right:23px}

  /* ---------- image upload ---------- */
  .upload-row{display:flex;gap:8px}
  .upload-row input{flex:1;min-width:0}
  .upload-row .btn{padding:11px 16px;white-space:nowrap;font-size:13.5px}
  .up-note{font-size:11.5px;color:var(--muted-2);margin-top:7px;min-height:14px;line-height:1.6}
  .up-note.ok{color:#8ff5c0}

  /* ---------- entrance animations ---------- */
  .pf[class*="anim-"]{animation-duration:.85s;animation-fill-mode:both;animation-timing-function:cubic-bezier(.2,.8,.2,1)}
  .pf.anim-fade{animation-name:pfFade}
  .pf.anim-rise{animation-name:pfRise}
  .pf.anim-zoom{animation-name:pfZoom}
  .pf.anim-flip{animation-name:pfFlip;transform-origin:top center}
  .pf.anim-blur{animation-name:pfBlur}
  .pf.anim-slide{animation-name:pfSlide}
  @keyframes pfFade{from{opacity:0}}
  @keyframes pfRise{from{opacity:0;transform:translateY(34px)}}
  @keyframes pfZoom{from{opacity:0;transform:scale(.92)}}
  @keyframes pfFlip{from{opacity:0;transform:perspective(1200px) rotateX(-32deg)}}
  @keyframes pfBlur{from{opacity:0;filter:blur(16px)}}
  @keyframes pfSlide{from{opacity:0;transform:translateX(44px)}}

  /* ---------- 3D text depth ---------- */
  .pf.is3d .pf-inner,.pf.is3d .pf-top,.pf.is3d .pf-who,.pf.is3d .pf-side,.pf.is3d .pf-main,
  .pf.is3d .pf-hero-inner,.pf.is3d .spot-inner,.pf.is3d .diag-inner,.pf.is3d .fp-inner,
  .pf.is3d .mag-head,.pf.is3d .bento-tile,.pf.is3d .frame-box{transform-style:preserve-3d}
  .pf.is3d .pf-kicker{transform:translateZ(52px)}
  .pf.is3d .pf-name{transform:translateZ(40px)}
  .pf.is3d .pf-role{transform:translateZ(28px)}
  .pf.is3d .pf-sec{transform:translateZ(20px)}
  .pf.is3d .pf-about,.pf.is3d .pf-info{transform:translateZ(14px)}

  /* ---------- image align-in-frame ---------- */
  .pf-avatar.align-on,.pola-photo.align-on,.pf-fp.align-on{outline:2px dashed var(--p-gold2,#e6c980);outline-offset:-3px}
  .pf-avatar img.aligning,.pola-photo img.aligning,.pf-fp .fp-img.aligning{cursor:move}

  .mini-select{font-family:inherit;font-size:13px;color:var(--txt);background:rgba(255,255,255,.04);
    border:1px solid var(--stroke);border-radius:8px;padding:9px 11px;cursor:pointer}
  .mini-select:focus{outline:none;border-color:var(--gold)}
  .mini-select option{background:var(--panel);color:var(--txt)}

  /* brand logo + site footer (elgoharyX) */
  .brand .mark{overflow:hidden;background:#0b1424}
  .brand .mark img{width:100%;height:100%;object-fit:contain}
  .site-foot{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;
    padding:22px 16px 30px;color:var(--muted-2);font-size:12.5px;border-top:1px solid var(--stroke-soft);margin-top:24px}
  .site-foot img{width:22px;height:22px;object-fit:contain;opacity:.92}
  .site-foot b{color:var(--gold-2);font-weight:600}

  /* profile social links */
  .pf-socials{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}
  .pf-soc{width:42px;height:42px;border-radius:10px;border:1px solid var(--p-stroke);
    background:color-mix(in srgb,var(--p-txt) 3%,transparent);display:grid;place-items:center;
    color:var(--p-muted);transition:.2s;text-decoration:none}
  .pf-soc:hover{color:var(--p-txt);border-color:var(--p-gold);transform:translateY(-2px)}
  .pf-soc svg{width:20px;height:20px}
  .l-sidebar .pf-side .pf-soc,.l-hero .pf-hero .pf-soc,.l-diagonal .diag-inner .pf-soc,
  .l-bento .bento-tile.hero .pf-soc,.l-fullphoto .fp-inner .pf-soc{
    border-color:rgba(255,255,255,.32);color:#fff;background:rgba(255,255,255,.14)}
  .l-sidebar .pf-side .pf-soc:hover,.l-hero .pf-hero .pf-soc:hover,.l-diagonal .diag-inner .pf-soc:hover,
  .l-bento .bento-tile.hero .pf-soc:hover,.l-fullphoto .fp-inner .pf-soc:hover{background:rgba(255,255,255,.28);border-color:#fff}

  /* contact-method builder */
  .link-add{display:flex;gap:8px;flex-wrap:wrap}
  .link-add .mini-select{flex:0 0 auto}
  .link-add input{flex:1;min-width:130px;font-family:inherit;font-size:14px;color:var(--txt);
    background:rgba(255,255,255,.03);border:1px solid var(--stroke);border-radius:9px;padding:11px 13px}
  .link-add input:focus{outline:none;border-color:var(--gold)}
  .link-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
  .link-empty{font-size:12px;color:var(--muted-2)}
  .link-chip{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);
    background:rgba(255,255,255,.03);border:1px solid var(--stroke-soft);border-radius:100px;padding:6px 6px 6px 12px}
  .link-chip svg{width:15px;height:15px;color:var(--gold-2)}
  .link-chip button{width:20px;height:20px;border-radius:50%;border:none;background:rgba(255,255,255,.06);
    color:var(--muted);cursor:pointer;font-size:11px;line-height:1}
  .link-chip button:hover{background:rgba(255,107,107,.2);color:#ff9a9a}

  /* ---------- light mode (site chrome) ---------- */
  html[data-mode="light"]{
    --bg:#eef1f7; --bg-2:#e4e9f2; --panel:#ffffff;
    --stroke:rgba(18,28,48,.13); --stroke-soft:rgba(18,28,48,.07);
    --txt:#16233d; --muted:#54617a; --muted-2:#8592ab; --glass:rgba(18,28,48,.03);
    --gold:#a8842f; --gold-2:#8a6a1f;
  }
  html[data-mode="light"] body{background:var(--bg);
    background-image:radial-gradient(1100px 700px at 85% -10%,rgba(47,93,176,.10),transparent 60%),
      radial-gradient(900px 600px at 0% 108%,rgba(201,165,72,.10),transparent 55%)}
  html[data-mode="light"] .appbar{background:rgba(255,255,255,.82)}
  html[data-mode="light"] .field input,html[data-mode="light"] .field textarea,
  html[data-mode="light"] .mini-select,html[data-mode="light"] .link-add input,
  html[data-mode="light"] .lay-search{background:rgba(18,28,48,.045)}
  html[data-mode="light"] .tpl,html[data-mode="light"] .lay,html[data-mode="light"] .opt-row,
  html[data-mode="light"] .item,html[data-mode="light"] .stat,html[data-mode="light"] .link-chip,
  html[data-mode="light"] .btn.ghost,html[data-mode="light"] .soc,html[data-mode="light"] .appbar .tag,
  html[data-mode="light"] .user-chip{background:rgba(18,28,48,.045)}
  html[data-mode="light"] .mp-card{background:linear-gradient(180deg,#fff,#f3f6fb)}
  html[data-mode="light"] .modal,html[data-mode="light"] .toast{background:#fff}
  html[data-mode="light"] .link-chip button,html[data-mode="light"] .switch .slider{background:rgba(18,28,48,.09)}
  html[data-mode="light"] .acc{background:rgba(18,28,48,.02)}
  html[data-mode="light"] .align-hint{background:rgba(18,28,48,.03)}

  /* ---------- accordion + sticky preview + align controls ---------- */
  .acc{border:1px solid var(--stroke);border-radius:12px;margin-bottom:12px;overflow:hidden;background:rgba(255,255,255,.012)}
  .acc>summary{list-style:none;cursor:pointer;padding:15px 16px;font-weight:600;font-size:14.5px;color:var(--txt);
    display:flex;align-items:center;justify-content:space-between;gap:10px;user-select:none}
  .acc>summary::-webkit-details-marker{display:none}
  .acc>summary::after{content:"⌄";color:var(--muted);font-size:18px;transition:transform .2s;line-height:1}
  .acc[open]>summary::after{transform:rotate(180deg)}
  .acc[open]>summary{border-bottom:1px solid var(--stroke-soft)}
  .acc-body{padding:16px}
  .acc>summary .sum-t{display:inline-flex;align-items:center;gap:9px}
  .acc>summary .sum-t svg{width:18px;height:18px;color:var(--gold-2);flex:none}
  .align-hint svg{width:14px;height:14px;vertical-align:-2px;margin-left:5px;color:var(--gold-2)}
  #animPlay svg{width:13px;height:13px}
  #alignToggle svg{width:15px;height:15px;vertical-align:-2px}
  .acc-lbl{font-size:12.5px;color:var(--muted);display:block;margin:2px 0 9px}
  .acc-body .acc-lbl:not(:first-child){margin-top:18px}

  .preview-col{align-self:start}
  @media(min-width:921px){
    /* independent scroll panes: the form and the preview each scroll on their own */
    .builder{height:calc(100vh - 160px);align-items:stretch}
    .builder>.panel{overflow-y:auto;min-height:0}
    .preview-col{height:100%;display:flex;flex-direction:column;min-height:0}
    .preview-col>.panel{flex:1;overflow-y:auto;min-height:0}
    .builder>.panel::-webkit-scrollbar,.preview-col>.panel::-webkit-scrollbar{width:8px}
    .builder>.panel::-webkit-scrollbar-thumb,.preview-col>.panel::-webkit-scrollbar-thumb{background:var(--stroke);border-radius:8px}
  }

  .align-ctl{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  .align-ctl .btn.ghost{padding:9px 14px;font-size:13px}
  .align-ctl .btn.ghost.active{border-color:var(--gold);color:var(--gold-2)}
  .zoom-lbl{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted)}
  .zoom-lbl input[type=range]{accent-color:var(--gold);width:130px}
  .align-hint{font-size:11.5px;color:var(--muted-2);line-height:1.7;margin-top:10px;
    border:1px dashed var(--stroke-soft);border-radius:9px;padding:9px 12px}
  .align-hint.on{border-color:var(--gold);color:var(--gold-2)}
  .align-sliders{display:grid;gap:10px;margin-top:12px}
  .align-sliders .rng{display:grid;grid-template-columns:64px 1fr;align-items:center;gap:10px;font-size:12.5px;color:var(--muted)}
  .align-sliders .rng input[type=range]{accent-color:var(--gold);width:100%}

  /* ---------- 10 continuous 3D motions ---------- */
  .pf-motion{width:100%;display:flex;justify-content:center;will-change:transform;transform-style:preserve-3d}
  .m3d-float{animation:m3dFloat 4s ease-in-out infinite}
  .m3d-sway{animation:m3dSway 5s ease-in-out infinite}
  .m3d-pendulum{animation:m3dPendulum 4s ease-in-out infinite}
  .m3d-spin{animation:m3dSpin 16s linear infinite}
  .m3d-flip{animation:m3dFlip 5s ease-in-out infinite}
  .m3d-depth{animation:m3dDepth 4.5s ease-in-out infinite}
  .m3d-wobble{animation:m3dWobble 6s ease-in-out infinite}
  .m3d-orbit{animation:m3dOrbit 8s ease-in-out infinite}
  .m3d-breathe{animation:m3dBreathe 4s ease-in-out infinite}
  .m3d-tiltloop{animation:m3dTiltloop 7s ease-in-out infinite}
  @keyframes m3dFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  @keyframes m3dSway{0%,100%{transform:perspective(1200px) rotateY(-9deg)}50%{transform:perspective(1200px) rotateY(9deg)}}
  @keyframes m3dPendulum{0%,100%{transform:rotate(-3.5deg)}50%{transform:rotate(3.5deg)}}
  @keyframes m3dSpin{from{transform:perspective(1400px) rotateY(0)}to{transform:perspective(1400px) rotateY(360deg)}}
  @keyframes m3dFlip{0%,100%{transform:perspective(1200px) rotateX(-11deg)}50%{transform:perspective(1200px) rotateX(11deg)}}
  @keyframes m3dDepth{0%,100%{transform:perspective(1200px) translateZ(-28px)}50%{transform:perspective(1200px) translateZ(28px)}}
  @keyframes m3dWobble{0%,100%{transform:perspective(1200px) rotateX(4deg) rotateY(-6deg)}33%{transform:perspective(1200px) rotateX(-5deg) rotateY(5deg)}66%{transform:perspective(1200px) rotateX(3deg) rotateY(7deg)}}
  @keyframes m3dOrbit{0%{transform:perspective(1200px) rotateY(7deg) rotateX(4deg)}25%{transform:perspective(1200px) rotateY(0) rotateX(6deg)}50%{transform:perspective(1200px) rotateY(-7deg) rotateX(4deg)}75%{transform:perspective(1200px) rotateY(0) rotateX(2deg)}100%{transform:perspective(1200px) rotateY(7deg) rotateX(4deg)}}
  @keyframes m3dBreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}
  @keyframes m3dTiltloop{0%,100%{transform:perspective(1200px) rotateX(7deg) rotateY(7deg)}50%{transform:perspective(1200px) rotateX(-7deg) rotateY(-7deg)}}
  @media(prefers-reduced-motion:reduce){.pf-motion{animation:none!important}}

  .pf-cover{position:relative;height:clamp(130px,18vw,170px);overflow:hidden;background:var(--p-cover);
    border-bottom:1px solid var(--p-stroke)}
  .pf-cover .lines{position:absolute;inset:0;opacity:.10;
    background-image:linear-gradient(90deg,rgba(255,255,255,.6) 1px,transparent 1px),
      linear-gradient(rgba(255,255,255,.6) 1px,transparent 1px);
    background-size:44px 44px;mask:radial-gradient(130% 100% at 75% 0%,#000,transparent 78%)}
  .pf.t-aurora .pf-cover .glow{position:absolute;inset:0;
    background:radial-gradient(200px 120px at 72% 10%,rgba(120,220,255,.5),transparent 60%),
      radial-gradient(220px 140px at 20% 120%,rgba(180,120,255,.45),transparent 60%);mix-blend-mode:screen}
  .pf-seal{position:absolute;top:20px;left:24px;width:58px;height:58px;opacity:.92}
  .pf-est{position:absolute;top:22px;right:26px;text-align:right;color:#eaf1ff;
    font-family:"Cormorant Garamond",serif;line-height:1.3}
  .pf-est .en{font-size:15px;font-weight:600}
  .pf-est .ar{font-size:12.5px;opacity:.85;font-family:"IBM Plex Sans Arabic"}

  .pf-inner{position:relative;z-index:2;padding:clamp(20px,4vw,40px);padding-top:clamp(16px,3vw,26px)}
  .pf-top{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;margin-top:-64px;position:relative;z-index:3}
  .pf-avatar{--s:118px;width:var(--s);height:var(--s);border-radius:50%;flex:none;position:relative;
    background:linear-gradient(135deg,var(--p-accent),#1c3f82);display:grid;place-items:center;
    font-family:"Amiri",serif;font-weight:700;font-size:46px;color:#fff;
    box-shadow:0 0 0 5px var(--p-bg),0 18px 44px -16px rgba(0,0,0,.6);overflow:hidden}
  .pf-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;z-index:1}
  .pf-avatar::after{content:"";position:absolute;inset:0;z-index:2;border-radius:50%;
    box-shadow:inset 0 0 0 2px rgba(201,165,72,.55)}
  .pf-who{flex:1;min-width:220px}
  .l-classic .pf-top .pf-who{padding-top:70px}
  .pf-kicker{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:1.3px;
    color:var(--p-gold2);border:1px solid color-mix(in srgb,var(--p-gold) 34%,transparent);
    background:color-mix(in srgb,var(--p-gold) 8%,transparent);padding:5px 12px;border-radius:6px;margin-bottom:12px}
  .pf-kicker::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--p-gold)}
  .pf-name{font-family:"Amiri",serif;font-weight:700;font-size:clamp(26px,4.4vw,40px);line-height:1.15;color:var(--p-txt)}
  .pf-name .en{display:block;font-family:"Cormorant Garamond",serif;font-size:.5em;font-weight:600;
    color:var(--p-muted);letter-spacing:.5px;margin-top:7px}
  .pf-role{margin-top:13px;color:var(--p-muted);font-size:14.5px;line-height:1.75;max-width:58ch}
  .pf-role b{color:var(--p-gold2);font-weight:600}

  .pf-div{height:1px;margin:28px 0;background:linear-gradient(90deg,transparent,var(--p-stroke),transparent)}
  .pf-sec{display:flex;align-items:center;gap:12px;font-family:"Cormorant Garamond",serif;font-size:19px;
    font-weight:600;color:var(--p-gold2);margin-bottom:16px}
  .pf-sec .ar{font-family:"IBM Plex Sans Arabic";font-size:14px;font-weight:600;letter-spacing:.8px}
  .pf-sec span.line{height:1px;flex:1;background:linear-gradient(90deg,color-mix(in srgb,var(--p-gold) 35%,transparent),transparent)}
  .pf-about{color:var(--p-muted);line-height:2;font-size:14.5px;max-width:70ch}

  .pf-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
  .pf-item{display:flex;gap:13px;align-items:center;padding:15px 16px;border-radius:10px;
    border:1px solid var(--p-soft);background:color-mix(in srgb,var(--p-txt) 3%,transparent)}
  .pf-ic{width:40px;height:40px;flex:none;border-radius:8px;display:grid;place-items:center;
    background:color-mix(in srgb,var(--p-accent) 16%,transparent);color:var(--p-gold2);border:1px solid var(--p-soft)}
  .pf-ic svg{width:19px;height:19px}
  .pf-item .l{font-size:11px;color:var(--p-muted2);letter-spacing:.4px}
  .pf-item .v{font-size:14px;color:var(--p-txt);font-weight:500;margin-top:3px;word-break:break-word}

  .pf-actions{display:flex;gap:10px;flex-wrap:wrap}
  .pf-btn{border:1px solid transparent;cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;
    padding:12px 20px;border-radius:9px;color:#fff;transition:.2s;text-decoration:none;
    display:inline-flex;align-items:center;gap:8px}
  .pf-btn.pri{background:linear-gradient(120deg,var(--p-accent),var(--p-accent2))}
  .pf-btn.pri:hover{transform:translateY(-2px)}
  .pf-btn.au{background:linear-gradient(120deg,var(--p-gold),var(--p-gold2));color:#1a1300}
  .pf.t-aurora .pf-btn.au{color:#12082e}
  .pf-btn.gh{background:transparent;border:1px solid var(--p-stroke);color:var(--p-muted)}
  .pf-btn.gh:hover{border-color:var(--p-gold);color:var(--p-txt);transform:translateY(-2px)}
  .pf-btn svg{width:17px;height:17px}
  .pf-contact-p{color:var(--p-muted);font-size:14px;line-height:1.8;margin-bottom:18px;max-width:52ch}

  /* viewer page */
  .viewer{min-height:100vh;display:grid;place-items:center;padding:44px 18px}
  .view-actions{position:fixed;top:16px;left:16px;z-index:30;display:flex;gap:8px;flex-wrap:wrap}

  /* ---------- auth ---------- */
  .user-chip{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
  .avatar-sm{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#1c3f82);
    display:grid;place-items:center;font-weight:700;color:#fff;font-size:13px;font-family:"Amiri",serif}
  .auth-wrap{min-height:calc(100vh - 62px);display:grid;place-items:center;padding:30px 18px}
  .auth-card{width:min(420px,100%)}
  .auth-card h2{margin-bottom:4px}
  .auth-tabs{display:flex;gap:6px;background:rgba(255,255,255,.03);border:1px solid var(--stroke);
    border-radius:10px;padding:4px;margin:18px 0 20px}
  .auth-tabs button{flex:1;padding:10px;border:none;background:transparent;color:var(--muted);border-radius:7px;
    cursor:pointer;font-family:inherit;font-weight:600;font-size:14px;transition:.2s}
  .auth-tabs button.active{background:linear-gradient(120deg,var(--accent),var(--accent-2));color:#fff}
  .auth-err{color:#ff9a9a;font-size:13px;min-height:18px;margin:2px 0 10px;text-align:center}
  .auth-alt{text-align:center;font-size:13px;color:var(--muted-2);margin-top:16px}
  .auth-alt a{color:var(--gold-2);cursor:pointer;text-decoration:underline}

  /* ---------- my profiles ---------- */
  .mp-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  .mp-head h2{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:600}
  .mp-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
  .mp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:14px}
  .mp-card{border:1px solid var(--stroke);border-radius:14px;overflow:hidden;
    background:linear-gradient(180deg,var(--panel),var(--bg-2));transition:.2s}
  .mp-card:hover{border-color:rgba(201,165,72,.4);transform:translateY(-3px)}
  .mp-cover{height:66px;position:relative}
  .mp-cover .badge{position:absolute;bottom:8px;right:10px;font-size:11px;color:#fff;
    background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);padding:3px 9px;border-radius:100px}
  .mp-body{padding:14px 16px}
  .mp-name{font-weight:600;font-size:15px;margin-bottom:3px;color:var(--txt)}
  .mp-meta{font-size:11.5px;color:var(--muted-2);margin-bottom:13px}
  .mp-actions{display:flex;flex-wrap:wrap;gap:7px}
  .mp-actions a,.mp-actions button{font-size:12px;padding:7px 11px;border-radius:8px;border:1px solid var(--stroke);
    background:transparent;color:var(--muted);cursor:pointer;text-decoration:none;font-family:inherit;
    display:inline-flex;align-items:center;gap:5px;transition:.2s}
  .mp-actions a:hover,.mp-actions button:hover{border-color:var(--gold);color:var(--txt)}
  .mp-actions .del:hover{border-color:#ff6b6b;color:#ff9a9a}
  .mp-empty{border:1px dashed var(--stroke);border-radius:14px;padding:44px 20px;text-align:center;color:var(--muted)}

  /* ---------- error screen ---------- */
  .err-wrap{min-height:calc(100vh - 62px);display:grid;place-items:center;padding:40px 18px}
  .err-card{width:min(560px,100%);text-align:center;position:relative;overflow:hidden;
    background:linear-gradient(180deg,var(--panel),var(--bg-2));border:1px solid var(--stroke);
    border-radius:16px;padding:clamp(30px,6vw,52px) clamp(22px,5vw,42px)}
  .err-card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),var(--gold-2),var(--gold),transparent)}
  .err-logo{width:52px;height:52px;object-fit:contain;border-radius:12px;margin:0 auto 18px;display:block;
    background:#0b1424;padding:6px;border:1px solid var(--stroke)}
  .err-code{font-family:"Cormorant Garamond",serif;font-weight:700;font-size:clamp(70px,16vw,120px);line-height:.9;
    background:linear-gradient(180deg,var(--gold-2),var(--gold) 60%,#a8842f);-webkit-background-clip:text;
    background-clip:text;color:transparent}
  .err-tag{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:1.3px;color:var(--gold-2);
    border:1px solid rgba(201,165,72,.32);background:rgba(201,165,72,.06);padding:5px 13px;border-radius:100px;margin:8px 0 16px}
  .err-tag i{width:7px;height:7px;border-radius:50%;background:#ff6b6b;box-shadow:0 0 10px #ff6b6b}
  .err-title{font-family:"Cormorant Garamond",serif;font-size:clamp(22px,4.5vw,30px);font-weight:600;margin-bottom:10px}
  .err-msg{color:var(--muted);font-size:14.5px;line-height:1.9;max-width:46ch;margin:0 auto 24px}
  .err-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

  /* ---------- mobile / phones ---------- */
  @media(max-width:600px){
    .appbar{padding:11px 14px;gap:8px}
    .brand{font-size:16px;gap:8px}
    .brand .mark{width:30px;height:30px}
    .brand .ar{display:none}
    .appbar .tag{display:none}
    .appbar>div:last-child{gap:6px}
    .appbar .btn.ghost{padding:8px 11px!important;font-size:12px!important}
    .user-chip{font-size:12px;gap:6px}
    .user-chip .avatar-sm{width:26px;height:26px;font-size:12px}
    .wrap{padding:16px 14px}
    .builder{gap:18px}

  /* interactive 3D tilt for cards rendered with .is3d */
  function wire3D(root=document){
    root.querySelectorAll('.pf.is3d').forEach(card=>{
      card.addEventListener('mousemove',e=>{
        const r=card.getBoundingClientRect();
        const px=(e.clientX-r.left)/r.width, py=(e.clientY-r.top)/r.height;
        card.style.transform=`perspective(1100px) rotateX(${(py-.5)*-9}deg) rotateY(${(px-.5)*11}deg)`;
        card.style.setProperty('--mx',px*100+'%'); card.style.setProperty('--my',py*100+'%');
      });
      card.addEventListener('mouseleave',()=>{ card.style.transform='perspective(1100px)'; });
    });
  }

  /* double-click an avatar photo, then drag to align it inside its frame (sets object-position) */
  function wireAlign(root=document){
    root.querySelectorAll('.pf-avatar img, .pola-photo img, .pf-fp .fp-img').forEach(img=>{
      const frame=img.parentElement;
      img.addEventListener('dblclick',e=>{
        e.preventDefault();
        const on=img.classList.toggle('aligning'); frame.classList.toggle('align-on',on);
        toast(on?'اسحب لتحريك الصورة · مرّر العجلة للتكبير · دبل كليك للإنهاء':'تم حفظ الصورة ✓');
      });
      img.addEventListener('wheel',e=>{
        if(!img.classList.contains('aligning'))return;
        e.preventDefault();
        let z=zoomSafe(state.photoZoom)+(e.deltaY<0?0.08:-0.08);
        z=Math.max(1,Math.min(3,z)); state.photoZoom=+z.toFixed(2);
        img.style.transform='scale('+state.photoZoom+')';
        const zr=document.getElementById('zoomRange'); if(zr) zr.value=state.photoZoom;
      },{passive:false});
      let drag=null;
      const cur=()=>{const p=(state.photoPos||'50% 50%').split(/\s+/).map(parseFloat);return{x:isNaN(p[0])?50:p[0],y:isNaN(p[1])?50:p[1]};};
      img.addEventListener('pointerdown',e=>{
        if(!img.classList.contains('aligning'))return;
        e.preventDefault(); try{img.setPointerCapture(e.pointerId);}catch{}
        const c=cur(); drag={sx:e.clientX,sy:e.clientY,px:c.x,py:c.y,w:img.clientWidth||1,h:img.clientHeight||1};
      });
      img.addEventListener('pointermove',e=>{
        if(!drag)return;
        let nx=drag.px-(e.clientX-drag.sx)/drag.w*100;
        let ny=drag.py-(e.clientY-drag.sy)/drag.h*100;
        nx=Math.max(0,Math.min(100,nx)); ny=Math.max(0,Math.min(100,ny));
        state.photoPos=nx.toFixed(1)+'% '+ny.toFixed(1)+'%';
        img.style.objectPosition=state.photoPos;
        const px=document.getElementById('posX'), py=document.getElementById('posY');
        if(px) px.value=Math.round(nx); if(py) py.value=Math.round(ny);
      });
      const end=()=>{drag=null;};
      img.addEventListener('pointerup',end); img.addEventListener('pointercancel',end);
    });
  }

  async function sha256(str){
    try{
      const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }catch{
      let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h+str.charCodeAt(i))>>>0; // fallback
      return 'x'+h.toString(16);
    }
  }
  const hashPass=(salt,pass)=>sha256(salt+'::'+pass);

  /* ---------- auth screen ---------- */
  function authError(e){
    const c=(e&&e.code)||'';
    if(c==='bad-username') return 'اسم المستخدم يجب أن يكون 3–20 حرفاً (أحرف/أرقام/_)';
    if(c==='username-taken') return 'اسم المستخدم مستخدم بالفعل';
    if(c.includes('email-already-in-use')) return 'هذا البريد مسجّل مسبقاً — سجّل الدخول';
    if(c.includes('wrong-password')||c.includes('user-not-found')) return 'بيانات الدخول غير صحيحة';
    if(c.includes('network')) return 'تعذّر الاتصال بالشبكة';
    return 'حدث خطأ، حاول مجدداً';
  }
  function showAuth(mode='login'){
    document.title='تسجيل الدخول — منشئ البروفايلات';
    document.body.style.background='';
    $('#app').innerHTML = appbar('login') + `
    <div class="auth-wrap"><div class="panel auth-card">
      <h2 id="authTitle">${mode==='login'?'تسجيل الدخول':'إنشاء حساب'}</h2>
      <div class="sub">ادخل لإدارة بروفايلاتك وربطها بحسابك.</div>
      <div class="auth-tabs">
        <button data-mode="login" class="${mode==='login'?'active':''}">دخول</button>
        <button data-mode="signup" class="${mode==='signup'?'active':''}">حساب جديد</button>
      </div>
      <div class="auth-err" id="authErr"></div>
      <div id="unameField" class="field" style="${mode==='login'?'display:none':''}">
        <label>اسم المستخدم</label><input id="a-user" placeholder="username" autocomplete="username"/>
      </div>
      <div class="field"><label>البريد الإلكتروني</label><input id="a-email" type="email" placeholder="name@example.com" autocomplete="email"/></div>
      <div class="field"><label>كلمة المرور</label><input id="a-pass" type="password" placeholder="6 أحرف على الأقل" autocomplete="current-password"/></div>
      <button class="btn primary" id="authGo">${mode==='login'?'دخول':'إنشاء الحساب'}</button>
    </div></div>`;
    wireAppbar();

    let cur=mode;
    const setMode=m=>{ cur=m;
      $('#authTitle').textContent=m==='login'?'تسجيل الدخول':'إنشاء حساب';
      $('#authGo').textContent  =m==='login'?'دخول':'إنشاء الحساب';
      $('#unameField').style.display=m==='login'?'none':'';
      $('#authErr').textContent='';
      document.querySelectorAll('.auth-tabs button').forEach(x=>x.classList.toggle('active',x.dataset.mode===m));
    };
    document.querySelectorAll('.auth-tabs button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));

    $('#authGo').onclick=async()=>{
      const err=$('#authErr'); err.textContent='';
      const email=$('#a-email').value.trim(), pass=$('#a-pass').value;
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ err.textContent='بريد إلكتروني غير صحيح'; return; }
      if(pass.length<6){ err.textContent='كلمة المرور يجب ألا تقل عن 6 أحرف'; return; }
      const go=$('#authGo'); go.disabled=true; const old=go.textContent; go.textContent='جارٍ…';
      try{
        if(cur==='signup'){
          const uname=$('#a-user').value.trim();
          if(!/^[a-zA-Z0-9_\.؀-ۿ]{3,20}$/.test(uname)) throw {code:'bad-username'};
          if(await usernameTaken(uname.toLowerCase())) throw {code:'username-taken'};
          if(await emailToUid(email)) throw {code:'email-already-in-use'};
          const uid=await uniqueUserId();
          const salt=shortId(16);
          const passHash=await hashPass(salt,pass);
          await set(ref(db,'users/'+uid),{username:uname,email,salt,passHash,createdAt:Date.now()});
          await set(ref(db,'usernames/'+uname.toLowerCase()),uid);
          await set(ref(db,'emails/'+encEmail(email)),uid);
          currentUser={uid,email,username:uname};
          saveSession(uid);
          toast('تم إنشاء الحساب ✓'); route();
        }else{
          const uid=await emailToUid(email);
          if(!uid) throw {code:'user-not-found'};
          const rec=await loadUserRecord(uid);
          if(!rec) throw {code:'user-not-found'};
          const h=await hashPass(rec.salt||'',pass);
          if(h!==rec.passHash) throw {code:'wrong-password'};
          currentUser={uid,email:rec.email,username:rec.username};
          saveSession(uid);
          toast('تم تسجيل الدخول ✓'); route();
        }
      }catch(e){
        console.error(e); err.textContent=authError(e);
        go.disabled=false; go.textContent=old;
      }
    };
  }

  async function startEdit(id){
    if(!currentUser){ location.href=location.pathname+'?edit='+id; return; }

    $('#app').innerHTML=`<div class="loader"><div><div class="spin"></div>جارٍ فتح البروفايل للتعديل…</div></div>`;
    try{
      const s=await get(child(ref(db),'profiles/'+id));
      if(!s.exists()){ toast('البروفايل غير موجود'); showMyProfiles(); return; }
      const d=s.val();
      state={...EMPTY};
      ['template','layout','kicker','name','nameEn','role','about','university','universityEn','faculty','specialization','degree','interests','threeD','anim','motion3d','photoPos','photoZoom','links','email','phone','photo']
        .forEach(k=>{ if(d[k]!=null) state[k]=d[k]; });
      if(!Array.isArray(state.links)) state.links = state.links?Object.values(state.links):[];
      editingId=id;
      editMeta={ownerUid:d.ownerUid||currentUser.uid, ownerName:d.ownerName||currentUser.username, createdAt:d.createdAt||Date.now()};
      showBuilder(); window.scrollTo(0,0);
    }catch(e){ console.error(e); toast('تعذّر الفتح'); showMyProfiles(); }
  }

        <button class="btn primary" id="gen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>
          ${editing?'حفظ التغييرات':'إنشاء الرابط وحفظه'}
        </button>
      </section>

      <section class="preview-col">
        <div class="preview-head"><span class="t">معاينة حيّة</span><span class="live">مباشر</span></div>
        <div class="panel" style="padding:clamp(14px,2vw,22px)"><div class="stage" id="preview"></div></div>
      </section>
    </div></div>

    <div class="overlay" id="ov">
      <div class="modal">
        <button class="close" id="ovClose">✕</button>
        <div class="ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="26" height="26"><path d="M20 6 9 17l-5-5"/></svg></div>
        <h3 id="ovTitle">تم الحفظ</h3>
        <p id="ovDesc">هذا هو رابط بروفايلك الدائم — شاركه مع من تريد.</p>
        <div class="linkbox"><input id="outLink" readonly/><button class="btn gold" id="copyLink" style="padding:9px 16px">نسخ</button></div>
        <div id="shortNote" style="text-align:center;font-size:12px;color:var(--muted-2);margin:-8px 0 16px;min-height:16px"></div>
        <div class="modal-actions">
          <a class="btn primary" id="openLink" target="_blank">فتح البروفايل</a>
          <button class="btn ghost" id="toMine">بروفايلاتي</button>
        </div>
        <button class="btn ghost" id="copyEdit" style="width:100%;margin-top:10px">${IC2.share} نسخ رابط المشاركة للتعديل</button>
      </div>
    </div>` + drawer('build');

    // live preview
    let alignOn=false;
    const applyAlign=()=>{
      const imgs=$('#preview').querySelectorAll('.pf-avatar img, .pola-photo img, .pf-fp .fp-img');
      imgs.forEach(img=>{ img.classList.toggle('aligning',alignOn); const f=img.parentElement; if(f) f.classList.toggle('align-on',alignOn); });
      const t=$('#alignToggle'); if(t){ t.classList.toggle('active',alignOn); t.innerHTML=alignOn?UICON.check+' وضع السحب مفعّل':UICON.scope+' سحب داخل الإطار'; }
      const h=$('#alignHint'); if(h) h.classList.toggle('on',alignOn);
      const p=(state.photoPos||'50% 50%').split(/\s+/);
      const zx=$('#posX'); if(zx) zx.value=parseFloat(p[0])||50;
      const zy=$('#posY'); if(zy) zy.value=parseFloat(p[1])||50;
      const z=$('#zoomRange'); if(z) z.value=zoomSafe(state.photoZoom);
    };
    const paint = ()=>{ $('#preview').innerHTML = renderCard(state); wire3D($('#preview')); wireAlign($('#preview')); applyAlign(); };
    const playPreviewAnim = ()=>{ const pf=$('#preview .pf'); if(pf&&state.anim&&state.anim!=='none'){ pf.classList.remove('anim-'+state.anim); void pf.offsetWidth; pf.classList.add('anim-'+state.anim); } };
    paint(); playPreviewAnim();

    // 3D toggle
    const td=$('#f-threeD'); if(td) td.onchange=()=>{ state.threeD=td.checked; paint(); };
    // entrance animation
    const an=$('#f-anim'); if(an) an.onchange=()=>{ state.anim=an.value; paint(); playPreviewAnim(); };
    const ap=$('#animPlay'); if(ap) ap.onclick=()=>playPreviewAnim();

    // 3D motion
    const mo=$('#f-motion'); if(mo) mo.onchange=()=>{ state.motion3d=mo.value; paint(); };

    // image align controls (drag + manual sliders)
    const previewImg=()=>$('#preview .pf-avatar img')||$('#preview .pola-photo img')||$('#preview .fp-img');
    const at=$('#alignToggle'); if(at) at.onclick=()=>{ alignOn=!alignOn; applyAlign(); if(alignOn) toast('اسحب الصورة داخل الإطار · أو استخدم المنزلقات'); };
    const posX=$('#posX'), posY=$('#posY'), zr=$('#zoomRange');
    const applyPos=()=>{ state.photoPos=(posX?posX.value:50)+'% '+(posY?posY.value:50)+'%'; const img=previewImg(); if(img) img.style.objectPosition=state.photoPos; };
    if(posX) posX.oninput=applyPos; if(posY) posY.oninput=applyPos;
    if(zr) zr.oninput=()=>{ state.photoZoom=zoomSafe(zr.value); const img=previewImg(); if(img) img.style.transform='scale('+state.photoZoom+')'; };
    const arst=$('#alignReset'); if(arst) arst.onclick=()=>{ state.photoPos='50% 50%'; state.photoZoom=1; paint(); toast('تمت إعادة ضبط الصورة'); };

    // contact methods (links)
    state.links = Array.isArray(state.links)?[...state.links]:[];
    const renderLinks=()=>{
      const el=$('#linkList'); if(!el) return;
      el.innerHTML = state.links.length ? state.links.map((l,i)=>{ const t=CONTACT_TYPES[l.type];
        return `<span class="link-chip">${t?t.icon:''}<span>${esc((t?t.name:l.type)+' — '+l.value)}</span><button data-rm="${i}" title="حذف">✕</button></span>`;}).join('')
        : '<span class="link-empty">لم تُضف أي وسيلة تواصل بعد.</span>';
      el.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{ state.links.splice(+b.dataset.rm,1); renderLinks(); paint(); });
    };
    renderLinks();
    const la=$('#linkAdd'); if(la) la.onclick=()=>{
      const type=$('#linkType').value, value=$('#linkVal').value.trim();
      if(!value){ toast('أدخل الرابط أو المُعرّف'); return; }
      state.links.push({type,value}); $('#linkVal').value=''; renderLinks(); paint();
    };
    const lv=$('#linkVal'); if(lv) lv.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); $('#linkAdd').click(); } });

    // image upload -> imgbb -> photo url
    const upBtn=$('#upBtn'), upFile=$('#upFile'), upNote=$('#upNote');
    if(upBtn){
      upBtn.onclick=()=>upFile.click();
      upFile.onchange=async()=>{
        const file=upFile.files&&upFile.files[0]; if(!file) return;
        if(!/^image\//.test(file.type)){ upNote.className='up-note'; upNote.textContent='الملف المختار ليس صورة'; return; }
        if(file.size>32*1024*1024){ upNote.className='up-note'; upNote.textContent='حجم الصورة يتجاوز 32MB'; return; }
        const old=upBtn.innerHTML; upBtn.disabled=true; upBtn.textContent='جارٍ الرفع…';
        upNote.className='up-note'; upNote.textContent='جارٍ رفع الصورة…';
        try{
          const url=await uploadToImgbb(file);
          state.photo=url;
          const pf=$('#f-photo'); if(pf) pf.value=url;
          paint();
          upNote.className='up-note ok'; upNote.textContent='✓ تم رفع الصورة ووضع الرابط تلقائياً';
        }catch(e){
          console.error(e); upNote.className='up-note'; upNote.textContent='تعذّر رفع الصورة، حاول مجدداً';
        }finally{ upBtn.disabled=false; upBtn.innerHTML=old; upFile.value=''; }
      };
    }

    // inputs
    [['name'],['nameEn'],['kicker'],['role'],['about'],['university'],['universityEn'],
     ['faculty'],['degree'],['specialization'],['interests'],['email'],['phone'],['photo']]
     .forEach(([k])=>{
       const el=$('#f-'+k); if(!el)return;
       el.addEventListener('input',()=>{state[k]=el.value;paint();});
     });

    // layout picker
    $('#lays').querySelectorAll('.lay').forEach(l=>{
      l.onclick=()=>{
        state.layout=l.dataset.lay;
        $('#lays').querySelectorAll('.lay').forEach(x=>x.classList.toggle('active',x===l));
        paint();
      };
    });
    const ls=$('#laySearch'); if(ls) ls.oninput=()=>{ const q=ls.value.trim();
      $('#lays').querySelectorAll('.lay').forEach(el=>{ el.style.display = el.dataset.name.includes(q)?'':'none'; }); };

    // color template picker
    $('#tpls').querySelectorAll('.tpl').forEach(t=>{
      t.onclick=()=>{
        state.template=t.dataset.tpl;
        $('#tpls').querySelectorAll('.tpl').forEach(x=>x.classList.toggle('active',x===t));
        paint();
      };
    });

    wireAppbar();
    let editLink='';

    // save (create or update)
    $('#gen').onclick = async ()=>{
      if(!currentUser){ showAuth('login'); return; }
      const btn=$('#gen'); btn.disabled=true; const old=btn.innerHTML; btn.innerHTML='جارٍ الحفظ…';
      const note=$('#shortNote'); note.textContent='';
      try{
        const owner     = editing ? editMeta.ownerUid  : currentUser.uid;
        const ownerName = editing ? editMeta.ownerName : currentUser.username;
        const createdAt = editing ? editMeta.createdAt : Date.now();
        const id = editingId || await uniqueShortId();
        const clean = {...state, ownerUid:owner, ownerName, createdAt, updatedAt:Date.now()};
        await set(ref(db,'profiles/'+id), clean);
        await set(ref(db,'userProfiles/'+owner+'/'+id), {name:state.name||'بدون اسم', template:state.template, updatedAt:Date.now()});
        // now in edit mode for subsequent saves
        editingId=id; editMeta={ownerUid:owner, ownerName, createdAt};

        const base=location.href.split('#')[0].split('?')[0];
        const full=base+'?id='+id;
        editLink=base+'?edit='+id;
        $('#ovTitle').textContent = editing?'تم حفظ التغييرات':'تم إنشاء البروفايل';
        $('#outLink').value=full; $('#openLink').href=full;
        $('#ov').classList.add('show');

        note.textContent='جارٍ اختصار الرابط…';
        const sh=await shorten(full);
        if(sh){ $('#outLink').value=sh; $('#openLink').href=sh; note.textContent='✓ تم اختصار الرابط تلقائياً عبر is.gd'; }
        else note.textContent=/^https?:/i.test(full)?'تعذّر الاختصار — هذا هو الرابط الكامل':'الاختصار التلقائي يعمل بعد رفع الموقع على استضافة (https)';
      }catch(e){
        console.error(e); toast('تعذّر الحفظ — سجّل الدخول وتحقّق من قواعد قاعدة البيانات');
      }finally{ btn.disabled=false; btn.innerHTML=old; }
    };

    $('#copyLink').onclick=()=>{navigator.clipboard?.writeText($('#outLink').value);toast('تم نسخ الرابط ✓');};
    $('#copyEdit').onclick=()=>{ if(editLink){navigator.clipboard?.writeText(editLink);toast('تم نسخ رابط التعديل ✓ — شاركه لمن يعدّل البروفايل');} };
    $('#ovClose').onclick=()=>$('#ov').classList.remove('show');
    $('#toMine').onclick=()=>{$('#ov').classList.remove('show'); showMyProfiles();};
    $('#ov').onclick=e=>{if(e.target===$('#ov'))$('#ov').classList.remove('show');};
  }

  /* ======================================================================
     VIEWER
     ====================================================================== */
  async function showViewer(id){
    $('#app').innerHTML = `<div class="loader"><div><div class="spin"></div>جارٍ تحميل البروفايل…</div></div>`;
    try{
      const snap = await get(child(ref(db),'profiles/'+id));
      if(!snap.exists()){
        renderError({code:'404', tag:'بروفايل غير موجود · NOT FOUND', title:'هذا البروفايل غير موجود',
          msg:'الرابط غير صحيح أو تم حذف البروفايل أو تعديل معرّفه. تحقّق من الرابط أو أنشئ بروفايلاً جديداً.'});
        return;
      }
      const d = snap.val();
      seoFor(d);
      document.body.style.background = PAGE_BG[d.template]||'#0c1424';
      $('#app').innerHTML = `<div class="viewer">${renderCard(d)}</div>`;
      wireCopy($('#app')); wire3D($('#app'));
      if(d.anim && d.anim!=='none'){ const pf=$('#app .pf'); if(pf) pf.classList.add('anim-'+d.anim); }
    }catch(e){
      console.error(e);
      renderError({code:'⚠', tag:'تعذّر التحميل · LOAD ERROR', title:'تعذّر تحميل البيانات',
        msg:'تحقّق من اتصالك بالإنترنت أو من قواعد قاعدة البيانات، ثم أعد المحاولة.', showReload:true});
    }
  }

  /* ---------- router (runs whenever auth state changes) ---------- */
  function route(){
    const p=new URLSearchParams(location.search);
    const viewId=p.get('id'), editId=p.get('edit');
    if(viewId){ showViewer(viewId); return; }              // public view
    if(editId){ currentUser?startEdit(editId):showAuth('login'); return; }  // edit needs login
    if(!currentUser){ showAuth('login'); return; }         // gate the builder
    showMyProfiles();                                       // logged-in landing = dashboard
  }
  (async function init(){
    const uid=getSession();
    if(uid){
      const rec=await loadUserRecord(uid);
      if(rec) currentUser={uid, email:rec.email||'', username:rec.username||'مستخدم'};
      else clearSession();
    }
    route();
  })();
</script>
</body>
</html>
